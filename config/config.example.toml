[mainConfig]
appName = "GopherAI"
host = "0.0.0.0"
port = 9090

[emailConfig]
authcode = "your-qq-smtp-authcode"
email = "your-qq-email@example.com"

[redisConfig]
host = "127.0.0.1"
port = 6379
password = ""
db = 0

[mysqlConfig]
host = "127.0.0.1"
port = 33306
user = "root"
password = "your-mysql-password"
databaseName = "GopherAI"
charset = "utf8mb4"

[jwtConfig]
expire_duration = 8760
access_expire_duration = 2
refresh_expire_duration = 168
issuer = "huanheart"
subject = "GopherAI"
key = "replace-with-a-strong-jwt-secret"

[openAIConfig]
apiKey = "your-chat-api-key"
modelName = "deepseek-chat"
baseUrl = "https://api.deepseek.com"

[rabbitmqConfig]
host = "127.0.0.1"
port = 5672
username = "guest"
password = "guest"
vhost = "/"

[ragModelConfig]
storeMode = "milvus_with_redis_cache"
embeddingModel = "text-embedding-v4"
embeddingApiKey = "your-embedding-api-key"
embeddingBaseUrl = "https://dashscope.aliyuncs.com/compatible-mode/v1"
chatModelName = "deepseek-chat"
chatApiKey = "your-rag-chat-api-key"
chatBaseUrl = "https://api.deepseek.com"
docDir = "./docs"
baseUrl = "https://api.deepseek.com"
dimension = 1024

[voiceServiceConfig]
voiceServiceApiKey = "your-baidu-tts-api-key"
voiceServiceSecretKey = "your-baidu-tts-secret-key"

[storageConfig]
provider = "local"
basePath = "uploads"
bucket = "gopherai"
endpoint = "127.0.0.1:9000"
accessKey = "minioadmin"
secretKey = "minioadmin"
useSSL = false
region = "us-east-1"
autoCreateBucket = true
objectPrefix = ""
uploadPresignExpirySeconds = 300
presignExpirySeconds = 300

[milvusConfig]
host = "127.0.0.1"
port = 19530
database = ""
collection = "rag_chunks"
username = ""
password = ""
enableAuth = false
dimension = 1024
queryCacheTTLSeconds = 300
indexedCacheTTLSeconds = 600

[logConfig]
path = "logs/gomind.log"
maxSizeMB = 20

[mcpConfig]
enabled = true
autoStart = true
baseUrl = "http://localhost:29871/mcp"
httpAddr = ":29871"
